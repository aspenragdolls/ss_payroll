<nav class="steps">
  {% for slug, label in payroll_steps %}
    {% set step_index = loop.index0 %}
    {% if step_index <= max_stage_index %}
      <a href="/payroll/{{ batch.id }}/{{ slug }}"
         class="{% if slug == current_step %}active{% endif %}">
        {{ label }}
      </a>
    {% else %}
      <span class="step-disabled">{{ label }}</span>
    {% endif %}
  {% endfor %}
</nav>
