# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploy: connect this repo in Render → New Blueprint → apply.
# Set DATABASE_URL in the dashboard to your Neon connection string before first deploy.

services:
  - type: web
    name: ss-payroll
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /auth/login
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-sonnet
